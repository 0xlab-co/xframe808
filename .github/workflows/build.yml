name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app
        run: |
          pyinstaller --noconfirm --onedir --windowed \
            --name "xFRAME808" \
            --osx-bundle-identifier "com.0xlab.xframe808" \
            --collect-all imageio_ffmpeg \
            main.py

      - name: Package ZIP
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "xFRAME808.app" "xFRAME808-macOS.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xFRAME808-macOS
          path: dist/xFRAME808-macOS.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/xFRAME808-macOS.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "xFRAME808" --collect-all imageio_ffmpeg main.py

      - name: Package ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/xFRAME808/*" -DestinationPath "dist/xFRAME808-Windows.zip"

      - name: Compute installer version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $v = $env:GITHUB_REF -replace "refs/tags/v", ""
          } else {
            $v = "0.0.0-dev"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=${{ steps.version.outputs.version }}" scripts\installer.iss

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: xFRAME808-Windows
          path: dist/xFRAME808-Windows.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: xFRAME808-Windows-Setup
          path: dist/installer/xFRAME808-Windows-Setup.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/xFRAME808-Windows.zip
            dist/installer/xFRAME808-Windows-Setup.exe
